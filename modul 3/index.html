<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Modul 3 - Form Data</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Input Data Mahasiswa</h1>
        <form id="mahasiswaForm">
            <div class="form-group">
                <label for="nama">Nama Lengkap Mahasiswa/i:</label>
                <input type="text" id="nama" placeholder="Masukkan nama..." required>
            </div>
            <div class="form-group">
                <label for="nim">NIM:</label>
                <input type="text" id="nim" placeholder="Masukkan NIM..." required>
            </div>
            <button type="submit" id="btnSubmit">Kirim Data</button>
        </form>

        <div id="displayArea" class="hidden">
            <h3>Hasil Pengiriman:</h3>
            <p id="resNama"></p>
            <p id="resNim"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
